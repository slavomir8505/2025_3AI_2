<div class="chat-container">
  <div class="chat-header">
    <h2>💬 Ollama Chat - {{ 'llama3.2:3b' }}</h2>
    <button mat-raised-button color="warn" (click)="clearChat()" *ngIf="messages.length > 0">
      Vymazať chat
    </button>
  </div>

  <div class="chat-messages" #messagesContainer>
    <div *ngIf="messages.length === 0" class="empty-state">
      <p>👋 Začnite konverzáciu s Ollama AI modelom</p>
    </div>

    <mat-card *ngFor="let message of messages" 
              [class.user-message]="message.role === 'user'"
              [class.assistant-message]="message.role === 'assistant'">
      <mat-card-content>
        <div class="message-header">
          <strong>{{ message.role === 'user' ? '👤 Vy' : '🤖 Ollama' }}</strong>
          <span class="timestamp">{{ message.timestamp | date:'short' }}</span>
        </div>
        <div class="message-content">{{ message.content }}</div>
      </mat-card-content>
    </mat-card>

    <div *ngIf="isLoading" class="loading-indicator">
      <mat-spinner diameter="30"></mat-spinner>
      <span>Ollama premýšľa...</span>
    </div>
  </div>

  <div class="chat-input">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Napíšte správu...</mat-label>
      <textarea 
        matInput 
        [(ngModel)]="userPrompt"
        (keydown.enter)="onEnterPress($event)"
        [disabled]="isLoading"
        rows="3"
        placeholder="Zadajte svoju otázku pre Ollama AI...">
      </textarea>
    </mat-form-field>

    <button 
      mat-raised-button 
      color="primary" 
      (click)="sendMessage()"
      [disabled]="!userPrompt.trim() || isLoading">
      {{ isLoading ? 'Odosielam...' : 'Odoslať' }}
    </button>
  </div>
</div>
